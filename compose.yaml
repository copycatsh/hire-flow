name: hire-flow

networks:
  hire-flow:
    name: hire-flow
    driver: bridge

volumes:
  postgres-jobs-data:
  postgres-payments-data:
  mysql-data:
  nats-data:
  qdrant-data:
  hf-cache:
  prometheus-data:
  grafana-data:

services:
  # ── Infrastructure ──────────────────────────────────────────

  traefik:
    image: traefik:v3.4
    container_name: hire-flow-traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres-jobs:
    image: postgres:16-alpine
    container_name: hire-flow-postgres-jobs
    environment:
      POSTGRES_USER: hire_flow
      POSTGRES_PASSWORD: hire_flow_dev
      POSTGRES_DB: jobs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-jobs-data:/var/lib/postgresql/data
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hire_flow -d jobs_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-payments:
    image: postgres:16-alpine
    container_name: hire-flow-postgres-payments
    environment:
      POSTGRES_USER: hire_flow
      POSTGRES_PASSWORD: hire_flow_dev
      POSTGRES_DB: payments_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-payments-data:/var/lib/postgresql/data
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hire_flow -d payments_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.4
    container_name: hire-flow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: hire_flow_dev
      MYSQL_DATABASE: contracts_db
      MYSQL_USER: hire_flow
      MYSQL_PASSWORD: hire_flow_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "hire_flow", "-phire_flow_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: hire-flow-nats
    command: ["-c", "/etc/nats/nats-server.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data/jetstream
      - ./infra/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: hire-flow-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: hire-flow-otel-collector
    command: ["--config", "/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config", "/etc/otelcol/config.yaml"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: hire-flow-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hire-flow
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:11.6.0
    container_name: hire-flow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - hire-flow
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Core Services ───────────────────────────────────────────

  jobs-api:
    build:
      context: .
      dockerfile: services/jobs-api/Dockerfile
    container_name: hire-flow-jobs-api
    environment:
      DATABASE_URL: "postgres://hire_flow:hire_flow_dev@postgres-jobs:5432/jobs_db?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      OTEL_ENDPOINT: "otel-collector:4317"
    ports:
      - "8001:8001"
    networks:
      - hire-flow
    depends_on:
      postgres-jobs:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-matching:
    build:
      context: ./services/ai-matching
    container_name: hire-flow-ai-matching
    environment:
      NATS_URL: "nats://nats:4222"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
      HF_HOME: "/cache/huggingface"
      OTEL_ENDPOINT: "otel-collector:4317"
    ports:
      - "8002:8002"
    volumes:
      - hf-cache:/cache/huggingface
    networks:
      - hire-flow
    depends_on:
      qdrant:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

  contracts:
    build:
      context: .
      dockerfile: services/contracts/Dockerfile
    container_name: hire-flow-contracts
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: hire_flow:hire_flow_dev@tcp(mysql:3306)/contracts_db?parseTime=true
      NATS_URL: nats://nats:4222
      PAYMENTS_URL: http://payments:8004
      OTEL_ENDPOINT: "otel-collector:4317"
    networks:
      - hire-flow
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
      payments:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8003/health > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  payments:
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    container_name: hire-flow-payments
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgres://hire_flow:hire_flow_dev@postgres-payments:5432/payments_db?sslmode=disable
      NATS_URL: nats://nats:4222
      OTEL_ENDPOINT: "otel-collector:4317"
    networks:
      - hire-flow
    depends_on:
      postgres-payments:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8004/health > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── BFF Layer ───────────────────────────────────────────────

  bff-client:
    build:
      context: .
      dockerfile: services/bff/client/Dockerfile
    container_name: hire-flow-bff-client
    environment:
      JWT_SECRET: "dev-secret-change-in-production"
      JOBS_URL: "http://jobs-api:8001"
      MATCHING_URL: "http://ai-matching:8002"
      CONTRACTS_URL: "http://contracts:8003"
      PAYMENTS_URL: "http://payments:8004"
      OTEL_ENDPOINT: "otel-collector:4317"
      COOKIE_SECURE: "false"
    ports:
      - "8010:8010"
    networks:
      - hire-flow
    depends_on:
      jobs-api:
        condition: service_healthy
      ai-matching:
        condition: service_healthy
      contracts:
        condition: service_healthy
      payments:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8010/health > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  bff-freelancer:
    build:
      context: .
      dockerfile: services/bff/freelancer/Dockerfile
    container_name: hire-flow-bff-freelancer
    environment:
      JWT_SECRET: "dev-secret-change-in-production"
      MATCHING_URL: "http://ai-matching:8002"
      CONTRACTS_URL: "http://contracts:8003"
      PAYMENTS_URL: "http://payments:8004"
      OTEL_ENDPOINT: "otel-collector:4317"
      COOKIE_SECURE: "false"
    ports:
      - "8011:8011"
    networks:
      - hire-flow
    depends_on:
      ai-matching:
        condition: service_healthy
      contracts:
        condition: service_healthy
      payments:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8011/health > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5

  bff-admin:
    build:
      context: .
      dockerfile: services/bff/admin/Dockerfile
    container_name: hire-flow-bff-admin
    environment:
      OTEL_ENDPOINT: "otel-collector:4317"
    ports:
      - "8012:8012"
    networks:
      - hire-flow
    depends_on:
      otel-collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8012/health > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 5
